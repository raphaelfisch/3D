<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Volume 18 · 3D-Werkstatt</title>
<link rel="stylesheet" href="shared.css">
<style>
  /* Vollbild-Viewer: Body fixiert, kein Scrollen */
  html, body {
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
  }
  /* Der shared.css-Hintergrund wird hier durch das 3D-Theme übermalt –
     das Canvas bedeckt ihn ohnehin vollständig. */

  #canvas-container {
    position: fixed; inset: 0;
    touch-action: none;
  }
  canvas { display: block; touch-action: none; }

  /* Floating Action Button (Settings, Reset) – runde Buttons rechts */
  .fab {
    position: fixed;
    width: 44px; height: 44px;
    background: var(--panel);
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
    border: 1px solid var(--border);
    border-radius: 50%;
    cursor: pointer;
    color: var(--text);
    display: flex;
    align-items: center; justify-content: center;
    font-size: 20px;
    z-index: 20;
    transition: background 0.2s, border-color 0.2s, transform 0.2s, opacity 0.2s;
  }
  .fab:hover {
    border-color: var(--accent-border);
    transform: scale(1.05);
  }
  body.settings-open #settings-toggle {
    opacity: 0;
    transform: scale(0.9);
    pointer-events: none;
  }

  /* Positionen: Theme-Toggle oben rechts (aus shared.css),
     dann Reset links daneben, Settings-Toggle wiederum links daneben. */
  #settings-toggle { top: 16px; right: 122px; }
  #reset-view      { top: 16px; right: 69px; }

  /* Overlay hinter dem Panel (Mobile) */
  .overlay-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .overlay-bg.visible {
    opacity: 1;
    pointer-events: auto;
  }

  #settings-panel {
    position: fixed;
    top: 72px; right: 16px;
    width: 280px;
    max-height: calc(100vh - 88px);
    overflow-y: auto;
    padding: 16px 20px;
    background: var(--panel);
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    z-index: 15;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s;
    transform-origin: top right;
  }
  #settings-panel.hidden {
    transform: scale(0.9);
    opacity: 0;
    pointer-events: none;
  }

  .settings-header {
    display: flex;
    align-items: center; justify-content: space-between;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .settings-header h3 {
    font-size: 14px; font-weight: 600;
  }
  .settings-close {
    background: none;
    border: none;
    color: var(--text);
    font-size: 24px;
    line-height: 1;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
  }
  .settings-close:hover { background: rgba(125, 211, 192, 0.1); }

  .settings-section { margin-bottom: 18px; }
  .settings-section:last-child { margin-bottom: 0; }
  .settings-section h2 {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .theme-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .theme-btn {
    padding: 12px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    min-height: 44px;
  }
  .theme-btn:hover {
    background: var(--accent-dim);
    border-color: var(--accent-border);
  }
  .theme-btn.active {
    background: var(--accent);
    color: #0f1419;
    border-color: var(--accent);
  }

  .color-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
  }
  .color-swatch {
    aspect-ratio: 1;
    border-radius: 10px;
    cursor: pointer;
    border: 2px solid var(--border-strong);
    transition: all 0.15s;
    position: relative;
    min-height: 36px;
  }
  .color-swatch:hover { transform: scale(1.1); }
  .color-swatch.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent);
  }

  .slider-row {
    display: flex; align-items: center;
    gap: 12px; margin-bottom: 14px;
  }
  .slider-row:last-child { margin-bottom: 0; }
  .slider-row label {
    font-size: 12px; font-weight: 500;
    color: var(--muted); min-width: 70px;
  }
  .slider-row input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    background: var(--border-strong);
    border-radius: 3px;
    outline: none;
    padding: 0;
    margin: 12px 0;
  }
  .slider-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 24px; height: 24px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid rgba(255,255,255,0.95);
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
  }
  .slider-row input[type="range"]::-moz-range-thumb {
    width: 24px; height: 24px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid rgba(255,255,255,0.95);
  }

  .info-item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 4px 0;
    font-size: 12px;
    gap: 12px;
  }
  .info-label { color: var(--muted); flex-shrink: 0; }
  .info-value {
    color: var(--text);
    font-weight: 500;
    text-align: right;
    word-break: break-all;
  }
  .dim-legend {
    display: block;
    font-size: 10px;
    font-weight: 400;
    color: var(--muted);
    margin-top: 3px;
    letter-spacing: 0.02em;
  }

  .controls-hint {
    position: fixed; bottom: 16px; left: 50%;
    transform: translateX(-50%);
    display: grid;
    grid-template-columns: repeat(3, minmax(80px, 1fr));
    column-gap: 20px;
    row-gap: 2px;
    font-size: 12px;
    color: var(--muted);
    padding: 12px 20px;
    text-align: center;
    max-width: calc(100vw - 32px);
    background: var(--panel);
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
    border: 1px solid var(--border);
    border-radius: 14px;
  }
  .controls-hint .label {
    font-weight: 600;
    color: var(--text);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .controls-hint .value {
    font-size: 12px;
    white-space: nowrap;
  }
  #controls-mobile { display: none; }

  .loading {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: var(--muted);
    pointer-events: none;
  }
  .loading.hidden { display: none; }

  /* Volume-18: Back-Link soll unten links sein, um Top-Rechts-Stack nicht zu überlagern –
     aber oben links ist frei. Also behalten wir die Standard-Position von shared.css. */

  /* ============ MOBILE ============ */
  @media (max-width: 700px) {
    #settings-toggle, #reset-view, .theme-toggle {
      width: 44px; height: 44px;
    }
    /* Auf Mobile: Theme-Toggle bleibt oben rechts, Reset und Settings daneben */
    #settings-toggle { right: 112px; }
    #reset-view { right: 62px; }

    #settings-panel {
      top: auto;
      bottom: 0; left: 0; right: 0;
      width: 100%;
      max-height: 70vh;
      overflow-y: auto;
      border-radius: 18px 18px 0 0;
      transform: translateY(0);
      transform-origin: bottom center;
      padding: 14px 16px 18px;
    }
    #settings-panel.hidden {
      transform: translateY(100%);
      opacity: 1;
    }

    .settings-header { margin-bottom: 10px; padding-bottom: 8px; }
    .settings-header h3 { font-size: 13px; }
    .settings-section { margin-bottom: 12px; }
    .settings-section h2 { margin-bottom: 6px; font-size: 9px; }
    .theme-grid { grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .theme-btn { padding: 8px 6px; font-size: 11px; min-height: 36px; text-align: center; }
    .color-grid { grid-template-columns: repeat(6, 1fr); gap: 6px; }
    .color-swatch { border-radius: 8px; min-height: 0; }
    .slider-row { margin-bottom: 6px; gap: 10px; }
    .slider-row label { font-size: 11px; min-width: 60px; }
    .slider-row input[type="range"] { margin: 8px 0; }
    .loading { font-size: 13px; }
  }

  @media (hover: none) and (pointer: coarse) {
    #controls-desktop { display: none; }
    #controls-mobile {
      display: grid;
      bottom: 12px;
      padding: 10px 16px;
      column-gap: 14px;
    }
    #controls-mobile .label { font-size: 9px; }
    #controls-mobile .value { font-size: 11px; }
  }
</style>
<script src="shared.js" defer></script>
</head>

<div id="canvas-container"></div>

<!-- Back-Link (oben links) -->
<a href="index.html" class="back-link">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

<!-- Theme-Toggle (oben rechts, aus shared.css) -->
<button class="theme-toggle" data-theme-toggle aria-label="Hell/Dunkel umschalten">
  <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>

  <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="4"/>
    <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>

</button>

<!-- Reset-View und Settings-Toggle -->
<button class="fab" id="reset-view" aria-label="Ansicht zurücksetzen" title="Ansicht zurücksetzen">⌂</button>

  <div class="settings-header">

  </div>
  <div class="settings-section">

    <h2>Licht &amp; Schatten</h2>
    <div class="slider-row">

      <input type="range" id="exposure-slider" min="0.3" max="2.5" step="0.05" value="1.0">
    </div>
    <div class="slider-row">
      <label>Schatten</label>
      <input type="range" id="shadow-slider" min="0" max="1" step="0.05" value="0.4">

  </div>
  <div class="settings-section">
    <h2>Modell</h2>
    <div class="info-item"><span class="info-label">Datei</span><span class="info-value" id="filename">–</span></div>
    <div class="info-item"><span class="info-label">Grösse</span><span class="info-value" id="stats">–</span></div>
  </div>
  <div class="copyright-line">© Raphael Fisch 2026</div>
</div>

</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// ========== HIER DEINE STL-DATEI EINTRAGEN ==========
const STL_URL = 'volume-18-skulptur.stl';
// ====================================================

// ========== THEMES (szenen-spezifisch, nicht das globale UI-Theme) ==========
const themes = {
  'studio-hell': {
    label: 'Studio hell',
    type: 'gradient',
    stops: [['#f5f7fa', 0], ['#e4e9f0', 0.6], ['#c8d2de', 1]],
    isLight: true,
    gridColors: [0xc8d2de, 0xb5c0cd],
    gridOpacity: 0.6,
    shadowOpacity: 0.25,
    exposure: 1.0
  },
  'studio-dunkel': {
    label: 'Studio dunkel',
    type: 'gradient',
    stops: [['#2a3340', 0], ['#151a22', 0.5], ['#0a0d12', 1]],
    isLight: false,
    gridColors: [0x3a4352, 0x252b36],
    gridOpacity: 0.5,
    shadowOpacity: 0.45,
    exposure: 1.1
  },
  'himmel': {
    label: 'Himmel',
    type: 'gradient',
    stops: [['#7cb7e0', 0], ['#c4dcef', 0.5], ['#f0e7d8', 1]],
    isLight: true,
    gridColors: [0xa8c4d8, 0x8eb0c8],
    gridOpacity: 0.5,
    shadowOpacity: 0.3,
    exposure: 1.0
  },
  'papier': {
    label: 'Papier',
    type: 'solid',
    color: '#f3ede0',
    isLight: true,
    gridColors: [0xd4cbb8, 0xc0b69f],
    gridOpacity: 0.5,
    shadowOpacity: 0.22,
    exposure: 1.05
  }
};

// ========== MODELLFARBEN ==========
const modelColors = [
  { name: 'Grün',       color: 0x5a9a6c, metalness: 0.2,  roughness: 0.4 },
  { name: 'Blaugrau',   color: 0xb8c5cc, metalness: 0.4,  roughness: 0.35 },
  { name: 'Türkis',     color: 0x7dd3c0, metalness: 0.2,  roughness: 0.4 },
  { name: 'Gold',       color: 0xe8b96a, metalness: 0.85, roughness: 0.25 },
  { name: 'Kupfer',     color: 0xc87a4a, metalness: 0.8,  roughness: 0.3 },
  { name: 'Weiss',      color: 0xf0f0f0, metalness: 0.1,  roughness: 0.5 },
  { name: 'Schwarz',    color: 0x2a2a2a, metalness: 0.5,  roughness: 0.3 },
  { name: 'Orange',     color: 0xe76f51, metalness: 0.1,  roughness: 0.45 },
  { name: 'Rot',        color: 0xc23b3b, metalness: 0.2,  roughness: 0.35 },
  { name: 'Blau',       color: 0x4a7bb8, metalness: 0.2,  roughness: 0.4 },
  { name: 'Violett',    color: 0x8b5cb8, metalness: 0.3,  roughness: 0.35 },
  { name: 'Silber',     color: 0xc8c8c8, metalness: 0.9,  roughness: 0.2 }
];

// ========== THREE.JS ==========
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(150, 120, 200);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.outputColorSpace = THREE.SRGBColorSpace;
container.appendChild(renderer.domElement);

const pmremGenerator = new THREE.PMREMGenerator(renderer);
scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;

const keyLight = new THREE.DirectionalLight(0xfff4e0, 2.0);
keyLight.position.set(120, 200, 100);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
keyLight.shadow.camera.left = -200;
keyLight.shadow.camera.right = 200;
keyLight.shadow.camera.top = 200;
keyLight.shadow.camera.bottom = -200;
keyLight.shadow.bias = -0.0005;
keyLight.shadow.radius = 4;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0xb0d4e0, 0.6);
fillLight.position.set(-120, 80, -80);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xffffff, 0.9);
rimLight.position.set(0, 100, -150);
scene.add(rimLight);

const ambient = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambient);

const groundGeo = new THREE.PlaneGeometry(1000, 1000);
const groundMat = new THREE.ShadowMaterial({ opacity: 0.4 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

let grid = new THREE.GridHelper(600, 30, 0x3a4352, 0x252b36);
scene.add(grid);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.enablePan = true;
controls.touches = {
  ONE: THREE.TOUCH.ROTATE,
  TWO: THREE.TOUCH.DOLLY_PAN
};

let modelSize = null;
let userHasZoomed = false;

function frameModel() {
  if (!modelSize) return;
  const maxDim = Math.max(modelSize.x, modelSize.y, modelSize.z);
  const fov = camera.fov * (Math.PI / 180);
  const aspect = camera.aspect;
  const distV = (maxDim / 2) / Math.tan(fov / 2);
  const distH = distV / aspect;
  const dist = Math.max(distV, distH) * 1.4;
  const direction = new THREE.Vector3()
    .subVectors(camera.position, controls.target)
    .normalize();
  camera.position.copy(controls.target).addScaledVector(direction, dist);
  controls.update();
}

controls.addEventListener('start', () => { userHasZoomed = true; });

function createGradientTexture(stops) {
  const canvas = document.createElement('canvas');
  canvas.width = 2;
  canvas.height = 512;
  const ctx = canvas.getContext('2d');
  const gradient = ctx.createLinearGradient(0, 0, 0, 512);
  stops.forEach(([color, pos]) => gradient.addColorStop(pos, color));
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, 2, 512);
  const texture = new THREE.CanvasTexture(canvas);
  texture.colorSpace = THREE.SRGBColorSpace;
  return texture;
}

let currentThemeKey = 'studio-dunkel'; // wird gleich durch globales Theme überschrieben

function applyTheme(key) {
  const t = themes[key];
  currentThemeKey = key;

  if (t.type === 'gradient') {
    scene.background = createGradientTexture(t.stops);
  } else {
    scene.background = new THREE.Color(t.color);
  }

  // NICHT mehr body.light direkt setzen – das macht der globale WerkstattTheme-Toggle.
  // Das 3D-Szenen-Theme ist unabhängig vom UI-Theme auswählbar.

  const oldGridY = grid.position.y;
  scene.remove(grid);
  grid.dispose?.();
  grid = new THREE.GridHelper(600, 30, t.gridColors[0], t.gridColors[1]);
  grid.material.transparent = true;
  grid.material.opacity = t.gridOpacity;
  grid.position.y = oldGridY;
  scene.add(grid);

  groundMat.opacity = t.shadowOpacity;
  renderer.toneMappingExposure = t.exposure;

  exposureSlider.value = t.exposure;
  shadowSlider.value = t.shadowOpacity;

  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.theme === key);
  });
}

const themeGrid = document.getElementById('theme-grid');
Object.entries(themes).forEach(([key, t]) => {
  const btn = document.createElement('button');
  btn.className = 'theme-btn';
  btn.dataset.theme = key;
  btn.textContent = t.label;
  btn.addEventListener('click', () => applyTheme(key));
  themeGrid.appendChild(btn);
});

const exposureSlider = document.getElementById('exposure-slider');
const shadowSlider = document.getElementById('shadow-slider');

exposureSlider.addEventListener('input', (e) => {
  renderer.toneMappingExposure = parseFloat(e.target.value);
});
shadowSlider.addEventListener('input', (e) => {
  groundMat.opacity = parseFloat(e.target.value);
});

let currentMesh = null;

function applyColor(idx) {
  if (!currentMesh) return;
  const c = modelColors[idx];
  currentMesh.material.color.setHex(c.color);
  currentMesh.material.metalness = c.metalness;
  currentMesh.material.roughness = c.roughness;
  currentMesh.material.needsUpdate = true;
  document.querySelectorAll('.color-swatch').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
}

const colorGrid = document.getElementById('color-grid');
modelColors.forEach((c, idx) => {
  const sw = document.createElement('div');
  sw.className = 'color-swatch';
  sw.style.background = '#' + c.color.toString(16).padStart(6, '0');
  sw.title = c.name;
  sw.addEventListener('click', () => applyColor(idx));
  colorGrid.appendChild(sw);
});

// ========== SETTINGS-TOGGLE ==========
const settingsPanel = document.getElementById('settings-panel');
const settingsToggle = document.getElementById('settings-toggle');
const settingsClose = document.getElementById('settings-close');
const overlay = document.getElementById('overlay');

function isMobile() { return window.innerWidth <= 700; }

function openSettings() {
  settingsPanel.classList.remove('hidden');
  document.body.classList.add('settings-open');
  if (isMobile()) overlay.classList.add('visible');
}
function closeSettings() {
  settingsPanel.classList.add('hidden');
  document.body.classList.remove('settings-open');
  overlay.classList.remove('visible');
}
function toggleSettings() {
  if (settingsPanel.classList.contains('hidden')) openSettings();
  else closeSettings();
}

settingsToggle.addEventListener('click', toggleSettings);
settingsClose.addEventListener('click', closeSettings);
overlay.addEventListener('click', closeSettings);

// Reset-View
document.getElementById('reset-view').addEventListener('click', () => {
  if (!modelSize) return;
  const maxDim = Math.max(modelSize.x, modelSize.y, modelSize.z);
  const fov = camera.fov * (Math.PI / 180);
  const aspect = camera.aspect;
  const distV = (maxDim / 2) / Math.tan(fov / 2);
  const distH = distV / aspect;
  const endDist = Math.max(distV, distH) * 1.4;
  const endTarget = new THREE.Vector3(0, 0, 0);
  const endDirection = new THREE.Vector3(maxDim, maxDim * 0.7, maxDim).normalize();
  const startTarget = controls.target.clone();
  const startOffset = camera.position.clone().sub(startTarget);
  const startDist = startOffset.length();
  const startDirection = startOffset.clone().normalize();
  const duration = 800;
  const startTime = performance.now();
  function easeInOutCubic(t) {
    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
  }
  const startQuat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), startDirection);
  const endQuat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), endDirection);
  function animateReset() {
    const elapsed = performance.now() - startTime;
    const t = Math.min(elapsed / duration, 1);
    const eased = easeInOutCubic(t);
    const currentQuat = new THREE.Quaternion().slerpQuaternions(startQuat, endQuat, eased);
    const currentDirection = new THREE.Vector3(0, 1, 0).applyQuaternion(currentQuat);
    const currentDist = startDist + (endDist - startDist) * eased;
    const currentTarget = new THREE.Vector3().lerpVectors(startTarget, endTarget, eased);
    camera.position.copy(currentTarget).addScaledVector(currentDirection, currentDist);
    controls.target.copy(currentTarget);
    controls.update();
    if (t < 1) requestAnimationFrame(animateReset);
    else userHasZoomed = false;
  }
  animateReset();
});

// ========== STL LADEN ==========
const loader = new STLLoader();
const loadingEl = document.getElementById('loading');
const statsEl = document.getElementById('stats');
const filenameEl = document.getElementById('filename');

filenameEl.textContent = STL_URL.split('/').pop();

loader.load(
  STL_URL,
  (geometry) => {
    geometry.rotateX(-Math.PI / 2);
    geometry.computeBoundingBox();
    geometry.computeVertexNormals();

    const bbox = geometry.boundingBox;
    const center = bbox.getCenter(new THREE.Vector3());
    geometry.translate(-center.x, -center.y, -center.z);

    const initialColor = modelColors[0];
    const material = new THREE.MeshStandardMaterial({
      color: initialColor.color,
      metalness: initialColor.metalness,
      roughness: initialColor.roughness,
      envMapIntensity: 1.2,
      flatShading: false
    });
    const mesh = new THREE.Mesh(geometry, material);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    scene.add(mesh);
    currentMesh = mesh;

    const size = bbox.getSize(new THREE.Vector3());
    modelSize = size;

    const maxDim = Math.max(size.x, size.y, size.z);
    camera.position.set(maxDim, maxDim * 0.7, maxDim);
    controls.target.set(0, 0, 0);
    frameModel();

    ground.position.y = -size.y / 2;
    grid.position.y = -size.y / 2;

    statsEl.innerHTML = `
      L ${size.x.toFixed(1)} × B ${size.z.toFixed(1)} × H ${size.y.toFixed(1)} mm
      <span class="dim-legend">L = Länge · B = Breite · H = Höhe</span>
    `;
    loadingEl.classList.add('hidden');
    document.querySelectorAll('.color-swatch')[0].classList.add('active');
  },
  (xhr) => {
    if (xhr.lengthComputable) {
      const pct = Math.round((xhr.loaded / xhr.total) * 100);
      loadingEl.textContent = `Lade Modell… ${pct}%`;
    }
  },
  (error) => {
    loadingEl.textContent = 'Fehler beim Laden: ' + STL_URL;
    statsEl.textContent = 'Datei nicht gefunden oder kein Webserver.';
    console.error(error);
  }
);

// ========== GLOBALES UI-THEME mit Szenen-Theme verknüpfen ==========
// Beim ersten Laden und bei jedem globalen Wechsel: das passende
// Szenen-Theme wählen, aber nur wenn der Nutzer nicht explizit
// ein anderes Szenen-Theme im Settings-Panel gewählt hat.
let userPickedSceneTheme = false;

function syncSceneThemeToUI(uiTheme) {
  if (userPickedSceneTheme) return;
  applyTheme(uiTheme === 'light' ? 'studio-hell' : 'studio-dunkel');
}

// Wenn der Nutzer selbst ein Szenen-Theme wählt, merken wir uns das
document.querySelectorAll('.theme-btn').forEach(btn => {
  btn.addEventListener('click', () => { userPickedSceneTheme = true; }, { once: false });
});

// Init mit globalem Theme, falls WerkstattTheme verfügbar
if (window.WerkstattTheme) {
  syncSceneThemeToUI(window.WerkstattTheme.get());
  window.WerkstattTheme.onChange(syncSceneThemeToUI);
} else {
  applyTheme('studio-dunkel');
}

let resizeTimeout;
window.addEventListener('resize', () => {
  document.body.classList.add('resizing');
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(() => {
    document.body.classList.remove('resizing');
  }, 150);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  if (!userHasZoomed) frameModel();
});

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
