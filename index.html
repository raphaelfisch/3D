<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D-Werkstatt</title>
<link rel="stylesheet" href="shared.css">
<style>
  /* Seite-spezifische Styles */
  .grid {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 32px 80px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 24px;
  }
  @media (max-width: 640px) {
    .grid { grid-template-columns: 1fr; }
  }

  .card {
    position: relative;
    background: var(--panel);
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    transition: border-color 0.2s, transform 0.2s;
  }
  .card:hover {
    border-color: var(--accent-border);
    transform: translateY(-2px);
  }

  .card-thumb {
    aspect-ratio: 16 / 10;
    position: relative;
    background: linear-gradient(135deg, var(--card-grad-start) 0%, var(--card-grad-end) 100%);
    overflow: hidden;
    transition: background 0.3s;
  }
  .card-thumb canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
  .card-thumb::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 60%, rgba(10, 13, 18, 0.4) 100%);
    pointer-events: none;
  }
  body.light .card-thumb::after {
    background: linear-gradient(180deg, transparent 60%, rgba(255, 255, 255, 0.3) 100%);
  }

  .card-body {
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .card h2 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0;
  }
  .card-arrow {
    display: inline-flex;
    align-items: center;
    color: var(--muted);
    flex-shrink: 0;
  }
  .card-arrow svg { width: 18px; height: 18px; }
  .card:hover .card-arrow { color: var(--accent); }

  @media (max-width: 640px) {
    .grid { padding: 24px 20px 60px; gap: 16px; }
    .card-body { padding: 18px 20px; }
    .card h2 { font-size: 18px; }
  }
</style>
<script src="shared.js" defer></script>
</head>
<body>

<!-- Theme-Toggle (oben rechts) -->
<button class="theme-toggle" data-theme-toggle aria-label="Hell/Dunkel umschalten">
  <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
  </svg>
  <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="4"/>
    <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
  </svg>
</button>

<section class="hero">
  <h1>3D-Werkstatt</h1>
</section>

<div class="grid">

  <a href="volume-18.html" class="card">
    <div class="card-thumb" data-thumb="skulptur"></div>
    <div class="card-body">
      <h2>Volume 18</h2>
      <span class="card-arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M13 6l6 6-6 6"/>
        </svg>
      </span>
    </div>
  </a>

  <a href="platonische-koerper.html" class="card">
    <div class="card-thumb" data-thumb="platonic"></div>
    <div class="card-body">
      <h2>Platonische Körper</h2>
      <span class="card-arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M13 6l6 6-6 6"/>
        </svg>
      </span>
    </div>
  </a>

  <a href="wuerfelschnitte.html" class="card">
    <div class="card-thumb" data-thumb="wuerfel"></div>
    <div class="card-body">
      <h2>Würfelschnitte</h2>
      <span class="card-arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M13 6l6 6-6 6"/>
        </svg>
      </span>
    </div>
  </a>

  <a href="3D-viewer.html" class="card">
    <div class="card-thumb" data-thumb="viewer"></div>
    <div class="card-body">
      <h2>3D-Viewer</h2>
      <span class="card-arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M13 6l6 6-6 6"/>
        </svg>
      </span>
    </div>
  </a>

</div>

<footer class="footer">
  © Raphael Fisch 2026
</footer>


<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

function createThumbnail(container, type) {
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, 16/10, 0.1, 100);
  camera.position.set(5, 3.5, 6);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;
  renderer.outputColorSpace = THREE.SRGBColorSpace;

  const resize = () => {
    const rect = container.getBoundingClientRect();
    if (rect.width === 0) return;
    renderer.setSize(rect.width, rect.height, false);
    camera.aspect = rect.width / rect.height;
    camera.updateProjectionMatrix();
  };

  container.appendChild(renderer.domElement);
  resize();

  const pmremGenerator = new THREE.PMREMGenerator(renderer);
  scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;

  const keyLight = new THREE.DirectionalLight(0xfff4e0, 1.5);
  keyLight.position.set(3, 5, 3);
  scene.add(keyLight);
  const fillLight = new THREE.DirectionalLight(0x7dd3c0, 0.5);
  fillLight.position.set(-3, 2, -2);
  scene.add(fillLight);
  const ambient = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambient);

  const material = new THREE.MeshStandardMaterial({
    color: 0x5a9a6c,
    metalness: 0.5,
    roughness: 0.3,
    envMapIntensity: 1.2
  });

  const group = new THREE.Group();

  if (type === 'skulptur') {
    const loader = new STLLoader();
    loader.load('volume-18-skulptur.stl', (geometry) => {
      geometry.rotateX(-Math.PI / 2);
      geometry.computeBoundingBox();
      geometry.computeVertexNormals();

      const bbox = geometry.boundingBox;
      const center = bbox.getCenter(new THREE.Vector3());
      geometry.translate(-center.x, -center.y, -center.z);

      const size = bbox.getSize(new THREE.Vector3());
      const scale = 3 / Math.max(size.x, size.y, size.z);
      geometry.scale(scale, scale, scale);

      const mesh = new THREE.Mesh(geometry, material);
      group.add(mesh);
    });

  } else if (type === 'platonic') {
    const solids = [
      new THREE.TetrahedronGeometry(0.55),
      new THREE.BoxGeometry(0.85, 0.85, 0.85),
      new THREE.OctahedronGeometry(0.6),
      new THREE.DodecahedronGeometry(0.55),
      new THREE.IcosahedronGeometry(0.55)
    ];
    const spacing = 1.45;
    const startX = -spacing * 2;

    solids.forEach((geo, i) => {
      const subGroup = new THREE.Group();
      const mesh = new THREE.Mesh(geo, material);
      subGroup.add(mesh);
      const edges = new THREE.EdgesGeometry(geo);
      const lineMat = new THREE.LineBasicMaterial({
        color: 0xffffff, transparent: true, opacity: 0.3
      });
      subGroup.add(new THREE.LineSegments(edges, lineMat));
      subGroup.position.x = startX + i * spacing;
      subGroup.userData.phase = i * 0.7;
      group.add(subGroup);
    });

    camera.position.set(0, 1.5, 7);
    camera.lookAt(0, 0, 0);

  } else if (type === 'viewer') {
    const geo = new THREE.TorusKnotGeometry(0.85, 0.3, 128, 24);
    const mesh = new THREE.Mesh(geo, material);
    group.add(mesh);

  } else if (type === 'wuerfel') {
    // Zwei Halb-Würfel (diagonaler Schnitt wie Schnitt II / BD), die sich
    // rhythmisch öffnen und schliessen.
    // Ein halber Würfel = dreiseitiges Prisma mit drei Vertices auf einer Kante
    // und drei auf der gegenüberliegenden. Wir bauen ihn aus BufferGeometry.
    const S = 1.0; // Halb-Kantenlänge (Würfel -1..1)
    // Teil 1: über der Diagonalen z > -x (ganz grob, aber wir nehmen einfach
    // 6 konkrete Vertices, die einen schräg geschnittenen Halbwürfel bilden)
    function makeHalfPrism(flip) {
      // Würfel-Ecken, getrennt durch eine schräge Ebene
      const v = [
        [-S, -S, -S], [ S, -S, -S], [ S,  S, -S],
        [-S, -S,  S], [ S, -S,  S], [ S,  S,  S]
      ];
      if (flip) v.forEach(p => { p[0] *= -1; p[1] *= -1; p[2] *= -1; });
      // Faces (4 Dreiecke für Quader-Boden+Dach, 4 für die Seiten + Schnittfläche)
      // Beim Flip drehen wir die Winding-Order der Dreiecke um, damit die
      // Normalen weiterhin nach aussen zeigen (sonst wäre das Teil "hohl").
      const f = [
        [0,1,2],                  // Boden
        [3,5,4],                  // Dach
        [0,3,4], [0,4,1],         // Seite 1 (y=-S)
        [1,4,5], [1,5,2],         // Seite 2 (x=S)
        [0,2,5], [0,5,3]          // Schnittfläche (diagonal)
      ];
      const positions = [];
      for (const [a, b, c] of f) {
        if (flip) {
          positions.push(...v[a], ...v[c], ...v[b]); // Reihenfolge umdrehen
        } else {
          positions.push(...v[a], ...v[b], ...v[c]);
        }
      }
      const g = new THREE.BufferGeometry();
      g.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      g.computeVertexNormals();
      return g;
    }

    const mat1 = new THREE.MeshStandardMaterial({
      color: 0x5a9a6c, metalness: 0.55, roughness: 0.28, envMapIntensity: 1.3, side: THREE.DoubleSide
    });
    const mat2 = new THREE.MeshStandardMaterial({
      color: 0xf0f0f0, metalness: 0.1, roughness: 0.5, envMapIntensity: 1.3, side: THREE.DoubleSide
    });

    const geo1 = makeHalfPrism(false);
    const geo2 = makeHalfPrism(true);

    const part1 = new THREE.Group();
    const part2 = new THREE.Group();
    part1.add(new THREE.Mesh(geo1, mat1));
    part2.add(new THREE.Mesh(geo2, mat2));
    // Edges
    const edgeMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 });
    part1.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo1, 20), edgeMat));
    part2.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo2, 20), edgeMat));

    group.add(part1);
    group.add(part2);

    // Animation-Daten: rhythmische Bewegung entlang der Trennungsrichtung
    group.userData.part1 = part1;
    group.userData.part2 = part2;
    group.userData.explodeDir = new THREE.Vector3(1, 1, 1).normalize();

    camera.position.set(4, 3, 5);
    camera.lookAt(0, 0, 0);
  }

  scene.add(group);

  function animate() {
    requestAnimationFrame(animate);
    const speed = 0.005;
    if (type === 'platonic') {
      group.children.forEach((child) => {
        child.rotation.y += speed;
        child.rotation.x = Math.sin(Date.now() * 0.0005 + child.userData.phase) * 0.3;
      });
    } else if (type === 'wuerfel') {
      // Pulsierende Explosion: Sinus-Verlauf zwischen 0 und 1
      const t = Date.now() * 0.0008;
      // Sanftes Ein-/Ausatmen: Wert zwischen 0 und 1 mit Halt in beiden Extremen
      const raw = (Math.sin(t) + 1) / 2; // 0..1
      // Kurve verflachen an den Enden:
      const ease = raw < 0.5 ? 2*raw*raw : 1 - Math.pow(-2*raw+2, 2)/2;
      const dir = group.userData.explodeDir;
      const dist = ease * 1.2;
      group.userData.part1.position.copy(dir).multiplyScalar(dist);
      group.userData.part2.position.copy(dir).multiplyScalar(-dist);
      group.rotation.y += speed;
    } else {
      group.rotation.y += speed;
    }
    renderer.render(scene, camera);
  }
  animate();

  new ResizeObserver(() => requestAnimationFrame(resize)).observe(container);
}

document.querySelectorAll('[data-thumb]').forEach(el => {
  createThumbnail(el, el.dataset.thumb);
});
</script>

</body>
</html>
